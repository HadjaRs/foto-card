<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agata Samya</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <div class="caixa-border">
        <div class="caixa-img">
            <div class="infos">
                <p>Agata Samya</p>
                <div class="icones">

                    <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
        </div>
        <button class="botao" onclick="ativarbt()">Redes Sociais</button>
    </div>

    


<script>
    function ativarbt() {
        let infoBox = document.querySelector('.infos');
        if (infoBox) {
            infoBox.classList.toggle('ativo');
            console.log("Botão clicado!");
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
           
            navigator.serviceWorker.register('/rede-card/sw.js') 
                .then(reg => console.log("PWA Ativo!", reg.scope))
                .catch(err => console.log("Erro no PWA:", err));
        });
    }
</script>
</body>
</html>
